tier: 1
notes:
  - Real public API surface (Connected Vehicle v2, Energy v2, Location v1, Energy Device v1) with
    downloadable OpenAPI specifications and dedicated endpoints/sandbox docs per API.
  - OAuth 2.0 against Volvo ID with explicit per-vehicle owner consent; VCC-API-Key client identifier
    on every request.
  - Documented rate limits (100 rpm read, 10 rpm commands, 10,000 calls/day per app), regional
    availability, and per-model car-support matrix.
  - Free public access under the API-specific agreement, with reserved right to introduce paid tiers.
  - Active open-source program at github.com/volvo-cars including official API code samples
    (developer-portal-api-samples) and Android Automotive samples.
  - Manual app-publishing review (14-21 days) for production credentials is the main friction point;
    no public status page or formal changelog/release-notes feed surfaced from the portal.
