position: Producing
description: Volvo Cars is a Swedish premium automotive OEM (headquartered in Gothenburg, owned by
  Geely) that operates the Volvo Cars Developer Portal as the public face of its connected-vehicle
  platform. The portal exposes the Connected Vehicle API, Energy API, Energy Device API, and Location
  API for third-party developers to build applications around real Volvo cars equipped with Volvo On
  Call or Google Built-In. APIs use OAuth 2.0 against Volvo ID with explicit owner consent, a
  VCC-API-Key client identifier, and a free tier capped at 10,000 calls per day per app. The portal
  also covers Android Automotive in-car app development with an official XC40 Recharge emulator, 3D
  assets and simulator resources, and an active open-source program at github.com/volvo-cars.
