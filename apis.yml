apis:
- aid: volvo-cars:volvo-cars-connected-vehicle-api
  name: Volvo Cars Connected Vehicle API
  tags:
  - Automotive
  - Connected Vehicle
  - Vehicle Data
  - Vehicle Commands
  - Telematics
  humanURL: https://developer.volvocars.com/apis/connected-vehicle/v2/overview/
  baseURL: https://api.volvocars.com/connected-vehicle/v2
  properties:
  - url: https://developer.volvocars.com/apis/connected-vehicle/v2/overview/
    type: Documentation
  - url: https://developer.volvocars.com/apis/connected-vehicle/v2/specification/
    type: OpenAPI
  - url: https://developer.volvocars.com/apis/connected-vehicle/v2/endpoints/
    type: Documentation
  - url: https://github.com/volvo-cars/developer-portal-api-samples/tree/main/connected-vehicle-fetch-sample
    name: Connected Vehicle Fetch Sample
    type: CodeExamples
  description: Receive vehicle data and send commands to the vehicle. Vehicle data covers status,
    diagnostics, statistics, and metadata — including odometer, fuel amount, tyre pressures, brake
    status, engine status, window status, warnings, and environment values. Commands include lock /
    unlock, climate start / stop, flash lights, sound horn, and engine start / stop, with a list-commands
    endpoint to discover which actions a given vehicle supports. Available on vehicles with Volvo On
    Call (model years 2010-2024) and on Google Built-In vehicles from model year 2020. Rate-limited to
    100 requests/min per Volvo ID + Client ID (10 requests/min for invocation/command endpoints) and
    10,000 calls per day per API key.
- aid: volvo-cars:volvo-cars-energy-api
  name: Volvo Cars Energy API
  tags:
  - Automotive
  - Energy
  - Electric Vehicles
  - Charging
  - Battery
  humanURL: https://developer.volvocars.com/apis/energy/v2/overview/
  baseURL: https://api.volvocars.com/energy/v2
  properties:
  - url: https://developer.volvocars.com/apis/energy/v2/overview/
    type: Documentation
  - url: https://developer.volvocars.com/apis/energy/v2/specification/
    type: OpenAPI
  description: Access the most recent energy state of a BEV or PHEV — battery charge level, target
    battery charge level, charging connection status, charging system status, charging type, charging
    power, charger power status, charging current limit, estimated charging time, and electric range.
    A capabilities endpoint reports what each vehicle supports. Available for EC40/C40, EX40/XC40 BEV,
    EX30, and the broader plug-in hybrid lineup (XC60/S90/V90 PHEV from MY 2022, XC90/S60/V60 PHEV from
    MY 2023, plus XC40 PHEV). Rate-limited to 100 requests/min per Volvo ID + Client ID and 10,000
    calls per day per API key.
- aid: volvo-cars:volvo-cars-location-api
  name: Volvo Cars Location API
  tags:
  - Automotive
  - Location
  - GPS
  - Telematics
  humanURL: https://developer.volvocars.com/apis/location/v1/overview/
  baseURL: https://api.volvocars.com/location/v1
  properties:
  - url: https://developer.volvocars.com/apis/location/v1/overview/
    type: Documentation
  - url: https://developer.volvocars.com/apis/location/v1/specification/
    type: OpenAPI
  - url: https://developer.volvocars.com/apis/location/v1/endpoints/
    type: Documentation
  description: Retrieve detailed information on a vehicle's current location. Designed for interactive
    applications that need to know where a consenting driver's Volvo is right now. Same regional
    availability and rate-limit profile as Connected Vehicle and Energy — 10,000 calls per day per API
    key and 100 requests/min per Volvo ID + Client ID. Production access is currently scoped to Europe /
    Middle East / Africa and US / Canada / Latin America regions.
- aid: volvo-cars:volvo-cars-energy-device-api
  name: Volvo Cars Energy Device API
  tags:
  - Automotive
  - Energy
  - Charging
  - Wallbox
  - Electric Vehicles
  humanURL: https://developer.volvocars.com/apis/energy-device-api/v1/overview/
  properties:
  - url: https://developer.volvocars.com/apis/energy-device-api/v1/overview/
    type: Documentation
  - url: https://developer.volvocars.com/apis/energy-device-api/v1/endpoints/
    type: Documentation
  description: API for managing wallboxes, charging sessions, and user ID tokens — the device-side
    counterpart to the vehicle-side Energy API. Enables integrations that pair a home charger or
    public charging device with a Volvo driver's identity for charging session orchestration and
    reporting.
