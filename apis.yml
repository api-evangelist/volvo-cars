- type: Authentication
  data:
  - name: OAuth 2.0 Authorization Code Flow
    description: End-user authorization via Volvo ID with the standard authorization-code flow; explicit
      user consent is required before an application can access a given vehicle's data. Test credentials
      are issued automatically; full production credentials require manual review and app publication
      (typically 14-21 days).
  - name: VCC-API-Key Header
    description: Every API request must include the application's VCC-API-Key header (the primary
      client identifier) in addition to the OAuth access token.
- type: Plans
  data:
  - id: free
    name: Free
    entries:
    - geo: Global
      unit: 1
      label: Use of Connected Vehicle, Energy, and Location APIs
      price: 0
      metric: api
      timeFrame: usage
      description: All APIs on the Volvo Cars Developer Portal are official public APIs and free to
        use. Volvo Cars expressly reserves the right to introduce paid tiers in the future.
    description: Free public access to the Connected Vehicle, Energy, Energy Device, and Location APIs
      under the API-specific agreement, subject to rate limits and app-publishing review.
- type: RateLimits
  data:
  - api: Connected Vehicle API
    limit: 100 requests / minute per Volvo ID + Client ID
    notes: Returns HTTP 429 when exceeded. Stricter limit of 10 requests / minute applies to invocation
      (command) endpoints such as lock/unlock and engine start/stop.
  - api: Energy API
    limit: 100 requests / minute per Volvo ID + Client ID
    notes: Returns HTTP 429 when exceeded.
  - api: Location API
    limit: 100 requests / minute per Volvo ID + Client ID
    notes: Returns HTTP 429 when exceeded.
  - api: All APIs (per-application cap)
    limit: 10,000 calls / day per app
    notes: Higher daily request limits may be granted by Volvo Cars on an individual basis. Effective
      as of the API-specific agreement last updated 2026-01-27.
- type: Regions
  data:
  - region: Test
    description: Test credentials work with demo Volvo IDs globally.
  - region: Europe / Middle East / Africa
    description: Available for published applications.
  - region: US / Canada / Latin America
    description: Available for published applications (Connected Vehicle, Energy, and Location APIs).
  - region: Other regions
    description: Not yet supported in production. Volvo Cars is working to bring additional regions
      online.
- type: Features
  data:
  - Connected Vehicle API v2 — read vehicle status, diagnostics, statistics, and metadata, and send
    commands (lock/unlock, climate start/stop, flash lights, sound horn, engine start/stop) backed by
    a public OpenAPI specification.
  - Energy API v2 — latest energy state for BEV and PHEV models, including battery level, charging
    status, charging power, estimated charging time, and electric range, plus a capabilities endpoint.
  - Energy Device API v1 — wallbox, charging session, and user-ID-token management for the device
    side of charging.
  - Location API v1 — current vehicle location for interactive applications.
  - OAuth 2.0 authorization-code flow against Volvo ID with explicit per-vehicle owner consent.
  - VCC-API-Key client identifier required on every request alongside the OAuth bearer token.
  - Public OpenAPI specifications downloadable per API, plus an in-portal sandbox using a demo Volvo
    ID account.
  - Rate limits exposed and documented (100 rpm per user/app, 10 rpm for commands, 10,000 calls/day
    per app).
  - Manual app-publishing review (14-21 days) to grant production credentials, reflecting Volvo Cars'
    explicit privacy and safety stance.
  - Open-source code samples (Node.js OAuth2 code flow, Connected Vehicle data fetch) on the Volvo
    Cars GitHub organization.
  - In-car app development on Android Automotive OS, with an official Volvo XC40 Recharge emulator
    and Android-for-Cars tooling.
  - 3D assets and a Volvo simulator surface for digital and immersive product experiences.
  - Open Source Program Office and an active GitHub organization (developer-portal-api-samples,
    automotive-media-sample, web-platform-examples, and more).
